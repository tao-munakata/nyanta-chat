services:
  nyanko:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-/nyanko}
    container_name: nyanko_chat
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BASE_PATH=${BASE_PATH:-/nyanko}
      - NEXT_PUBLIC_BASE_PATH=${BASE_PATH:-/nyanko}
      - DB_PATH=/app/data/nyanko.db
    volumes:
      - ./data:/app/data
    ports:
      - "${HOST_PORT:-3001}:3000"
    restart: always
