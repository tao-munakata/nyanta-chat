services:
  nyanta:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-/nyanta}
    container_name: nyanta_chat
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - BASE_PATH=${BASE_PATH:-/nyanta}
      - NEXT_PUBLIC_BASE_PATH=${BASE_PATH:-/nyanta}
      - DB_PATH=/app/data/nyanta.db
    volumes:
      - ./data:/app/data
    ports:
      - "${HOST_PORT:-3001}:3000"
    restart: always
